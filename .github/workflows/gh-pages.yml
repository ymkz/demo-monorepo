name: gh-pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/api/src/main/resources/static/openapi/**"
      - ".github/workflows/gh-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CI: true
  TZ: Asia/Tokyo
  DO_NOT_TRACK: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create dist directory
        run: mkdir -p dist

      - name: Copy OpenAPI files
        run: |
          cp -r apps/api/src/main/resources/static/openapi dist/

      - name: Create index.html
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=./openapi/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="./openapi/">OpenAPI Documentation</a>...</p>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        id: deployment
